<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparación de Estaciones</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        h1 {
            text-align: center;
        }

        .controls {
            margin-bottom: 20px;
        }

        select {
            padding: 8px;
            font-size: 14px;
        }

        .chart-container {
            width: 100%;
            height: 600px;
        }

        #lastUpdated {
            margin-top: 10px;
            color: #666;
        }
    </style>
</head>
<body>

<h1>Comparación de Estaciones Meteorológicas</h1>

<div class="controls">
    <select id="metricSelect">
        <option value="pm25">PM2.5</option>
        <option value="pm10">PM10</option>
        <option value="aqi">AQI</option>
    </select>
</div>

<div class="chart-container">
    <canvas id="comparisonChart"></canvas>
</div>

<div id="lastUpdated"></div>

<script>

let pollutionData = null;
let chart = null;

async function loadData() {

    const response = await fetch("pollution.json");
    pollutionData = await response.json();

    document.getElementById("lastUpdated").innerHTML =
        "Última actualización: " +
        new Date(pollutionData.generated_at).toLocaleString();

    drawChart("pm25");
}

function drawChart(metric) {

    const datasets = [];

    Object.entries(pollutionData.sensors)
        .forEach(([sensorId, sensorInfo]) => {

            const last24Hours =
                sensorInfo.data.slice(-288);

            datasets.push({
                label: sensorInfo.name,

                data: last24Hours.map(
                    item => item[metric]
                ),

                tension: 0.2,

                pointRadius: 0
            });
        });

    const firstSensor =
        Object.values(pollutionData.sensors)[0];

    const labels =
        firstSensor.data
            .slice(-288)
            .map(item =>
                new Date(item.timestamp)
                    .toLocaleString()
            );

    let label = metric;

    if (metric === "pm25")
        label = "PM2.5";

    if (metric === "pm10")
        label = "PM10";

    if (metric === "aqi")
        label = "AQI";

    if (chart) {
        chart.destroy();
    }

    chart = new Chart(
        document.getElementById("comparisonChart"),
        {
            type: "line",

            data: {
                labels: labels,
                datasets: datasets
            },

            options: {

                responsive: true,

                maintainAspectRatio: false,

                interaction: {
                    mode: 'index',
                    intersect: false
                },

                plugins: {

                    legend: {
                        display: true,
                        position: 'top'
                    },

                    title: {
                        display: true,
                        text: label + " - Últimas 24 horas"
                    }
                },

                scales: {

                    x: {

                        title: {
                            display: true,
                            text: "Fecha y Hora"
                        },

                        ticks: {
                            maxTicksLimit: 8
                        }
                    },

                    y: {

                        title: {
                            display: true,
                            text: label
                        }
                    }
                }
            }
        }
    );
}

document.getElementById("metricSelect")
    .addEventListener("change", () => {

        drawChart(
            document.getElementById("metricSelect").value
        );
    });

loadData();

</script>

</body>
</html>
